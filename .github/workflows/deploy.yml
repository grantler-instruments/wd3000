name: Deploy to GitHub Pages

# Push-to-main deploys are gated by the CI workflow's result (no duplicate test
# run). Manual runs (workflow_dispatch) still run the full gate themselves.
on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  test:
    if: ${{ github.event_name == 'workflow_dispatch' }}
    uses: ./.github/workflows/test.yml

  build:
    needs: test
    if: >-
      ${{ always() && (
        (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success') ||
        (github.event_name == 'workflow_dispatch' && needs.test.result == 'success')
      ) }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install app dependencies
        run: npm ci

      - name: Install website dependencies
        run: npm ci --legacy-peer-deps
        working-directory: website

      # Project Pages URL: grantler-instruments.github.io/wd3000/
      # Marketing at /wd3000/, web app at /wd3000/app/
      - name: Build marketing site + app for GitHub Pages
        run: npm run build:pages

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    # `test` is skipped on workflow_run; without always(), that skip propagates
    # here even when build succeeded.
    if: always() && needs.build.result == 'success'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4

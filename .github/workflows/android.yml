name: Android

# Separate from the CI gate so NDK/APK cost does not block Pages deploys.
# Runs when native/Android-related paths change, or via manual dispatch.
on:
  push:
    branches: [main]
    paths:
      - "src-tauri/**"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/android.yml"
  pull_request:
    paths:
      - "src-tauri/**"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/android.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK
        run: |
          sdkmanager "ndk;29.0.13846066"
          echo "NDK_HOME=$ANDROID_HOME/ndk/29.0.13846066" >> "$GITHUB_ENV"

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target
          prefix-key: android-aarch64

      - run: npm ci

      - name: Build Android debug APK
        run: npm run tauri:android:build

      - name: Upload Android debug APK
        uses: actions/upload-artifact@v4
        with:
          name: android-debug-apk
          path: src-tauri/gen/android/app/build/outputs/apk/**/*.apk
          if-no-files-found: error
          retention-days: 14

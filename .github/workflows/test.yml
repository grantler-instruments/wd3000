name: Test

# Single source of truth for the CI gate. Called by ci via
# `uses: ./.github/workflows/test.yml`.
on:
  workflow_call:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Build
        run: npm run build

      - name: Unit tests with coverage
        run: npm run test:coverage

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage/
          retention-days: 14

      - name: Install Playwright
        run: npm run test:e2e:install -- --with-deps

      # Reuses dist/ from the Build step (playwright preview-only when CI=1).
      - name: E2E smoke tests
        run: npm run test:e2e:smoke

  rust:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src-tauri
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            libasound2-dev \
            libudev-dev
        working-directory: .

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target
          prefix-key: rust-ci

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Unit tests
        run: cargo test --lib

  # Deploy rebuilds site/ on main; release/tag CI does not ship Pages.
  # Keep this compile gate on pull requests only to avoid a double build:pages.
  pages:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install app dependencies
        run: npm ci

      - name: Install website dependencies
        run: npm ci
        working-directory: website

      - name: Build Pages site (marketing + app)
        run: npm run build:pages

[[permission]]
identifier = "osc-midi-default"
description = "Enables OSC and MIDI input/output commands."
commands.allow = [
  "send_osc",
  "list_midi_outputs",
  "send_midi_note",
  "send_midi_note_off",
  "send_midi_cc",
  "send_midi_program_change",
  "send_midi_pitch_bend",
  "send_midi_channel_pressure",
  "send_midi_poly_pressure",
  "send_midi_raw",
  "list_midi_inputs",
  "supports_virtual_midi",
  "list_virtual_midi_ports",
  "create_virtual_midi_output",
  "create_virtual_midi_input",
  "close_virtual_midi_output",
  "close_virtual_midi_input",
  "start_osc_listener",
  "stop_osc_listener",
  "start_tuio_listener",
  "stop_tuio_listener",
  "send_tuio_cursors",
  "start_midi_input",
  "stop_midi_input",
  "start_input_listeners",
  "stop_input_listeners",
  "start_artnet_listener",
  "stop_artnet_listener",
  "get_artnet_listener_status",
  "send_artnet_dmx",
  "list_serial_ports",
  "connect_enttec_pro",
  "disconnect_enttec_pro",
  "is_enttec_pro_connected",
  "send_enttec_pro_dmx",
  "start_mqtt_broker",
  "stop_mqtt_broker",
  "start_mqtt_listener",
  "stop_mqtt_listener",
  "get_mqtt_broker_status",
  "mqtt_publish",
  "get_local_ip",
]
